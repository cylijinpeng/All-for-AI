name: Deep Research Brief
description: Prompt for turning a broad topic into a focused research brief with questions, sources, and synthesis goals.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as topic and audience.

      Return:
      1. Scope
      2. Research questions
      3. Source priorities
      4. Brief structure
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
