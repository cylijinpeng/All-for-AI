name: User Story Pack
description: Prompt for turning a product idea into user stories, acceptance criteria, and release slices.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as feature or product idea.

      Return:
      1. Primary stories
      2. Acceptance criteria
      3. Edge cases
      4. MVP slice
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
