name: Test Strategy
description: Prompt for designing the smallest effective test plan for a change or feature.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as change summary and risk context.

      Return:
      1. Risk surface
      2. Recommended test layers
      3. Key cases
      4. What can stay manual
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
