name: Incident Postmortem
description: Prompt for turning incident notes into a concise postmortem with root cause and prevention actions.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as incident timeline and symptoms.

      Return:
      1. Impact
      2. Root cause
      3. Contributing factors
      4. Prevention actions
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
