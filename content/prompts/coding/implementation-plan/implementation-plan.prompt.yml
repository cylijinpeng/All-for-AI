name: Implementation Plan
description: Prompt for turning a feature request into a buildable implementation plan.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as feature request and repo context.

      Return:
      1. Requirements
      2. Affected areas
      3. Implementation steps
      4. Verification plan
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
