name: Refactor Plan
description: Prompt for converting messy code or a broad cleanup request into a staged refactor plan.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as code snippet or module summary.

      Return:
      1. Refactor goals
      2. Constraints
      3. Step-by-step plan
      4. Risk controls and test plan
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
