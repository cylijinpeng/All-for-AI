name: Eval Plan
description: Prompt for designing an evaluation plan for prompts, agents, or LLM application quality.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.2
messages:
  - role: system
    content: >
      You are a practical AI builder assistant. Produce a structured, action-oriented result.
      Prefer concrete outputs over vague advice and clearly flag uncertainties.
  - role: user
    content: |
      Help with the following task.

      Input:
      {{input}}

      Context:
      {{context}}

      Treat the input as system description and risk areas.

      Return:
      1. What to measure
      2. Dataset ideas
      3. Eval types
      4. Pass/fail criteria
testData:
  - input: |
      input: example task
      context: example context
    expected: The output should be structured and action-oriented.
