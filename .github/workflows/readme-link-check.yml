name: README Link Coverage

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  readme-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-readme-links.js
